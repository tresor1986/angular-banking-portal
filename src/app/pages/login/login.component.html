<div class="login-wrapper">
  <p-card>
    <ng-template pTemplate="header">
      <div class="login-header">
        <i class="pi pi-building" style="font-size: 2rem; color: #1976d2"></i>
        <h2>Banking Portal</h2>
        <p>Sign in to your account</p>
      </div>
    </ng-template>

    <div class="field">
      <label>Email</label>
      <input pInputText [(ngModel)]="email" placeholder="admin@bank.lu" />
    </div>

    <div class="field">
      <label>Password</label>
      <input pInputText type="password" [(ngModel)]="password" placeholder="1234" />
    </div>

    <p class="error-msg" *ngIf="error">{{ error }}</p>

    <p-button label="Sign In" icon="pi pi-sign-in" (onClick)="login()" styleClass="w-full" />

    <ng-template pTemplate="footer">
      <small>Demo: admin@bank.lu / 1234</small>
    </ng-template>
  </p-card>
</div>
