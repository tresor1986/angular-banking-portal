<div class="content">
  <div class="toolbar">
    <h2>Client List</h2>
    <div class="toolbar-actions">
      <input
        pInputText
        [(ngModel)]="searchText"
        (input)="onSearch()"
        placeholder="Search by name, ID or sector..."
        style="width: 300px"
      />
      <p-button
        *ngIf="canCreate"
        label="New Client"
        icon="pi pi-plus"
        (onClick)="newClient()"
      />
    </div>
  </div>

  <p-table
    [value]="filteredClients"
    stripedRows
    [paginator]="true"
    [rows]="5"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Company ID</th>
        <th>Company Name</th>
        <th>Sector</th>
        <th>Country</th>
        <th>Manager</th>
        <th>Status</th>
        <th *ngIf="canDelete">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-client>
      <tr (click)="goToDetail({data: client})" style="cursor: pointer">
        <td>{{ client.companyId }}</td>
        <td>{{ client.companyName }}</td>
        <td>{{ client.sector }}</td>
        <td>{{ client.country }}</td>
        <td>{{ client.manager }}</td>
        <td>
          <span [class]="'status-badge status-' + client.status">
            {{ client.status | uppercase }}
          </span>
        </td>
        <td *ngIf="canDelete" (click)="$event.stopPropagation()">
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            (onClick)="deleteClient(client)"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  header="New Client"
  [(visible)]="showDialog"
  [modal]="true"
  [style]="{ width: '500px' }"
  [draggable]="false"
>
  <form [formGroup]="clientForm">

    <div class="field">
      <label>Company Name *</label>
      <input pInputText formControlName="companyName" style="width: 100%" />
      <small *ngIf="clientForm.get('companyName')?.invalid && clientForm.get('companyName')?.touched" class="error">
        Company Name is required
      </small>
    </div>

    <div class="field">
      <label>Company ID *</label>
      <input pInputText formControlName="companyId" style="width: 100%" />
      <small *ngIf="clientForm.get('companyId')?.invalid && clientForm.get('companyId')?.touched" class="error">
        Company ID is required
      </small>
    </div>

    <div class="field">
      <label>Sector *</label>
      <p-select
        formControlName="sector"
        [options]="sectorOptions"
        optionLabel="label"
        optionValue="value"
        placeholder="Select sector"
        style="width: 100%"
      />
    </div>

    <div class="field">
      <label>Country *</label>
      <input pInputText formControlName="country" style="width: 100%" />
    </div>

    <div class="field">
      <label>Manager *</label>
      <input pInputText formControlName="manager" style="width: 100%" />
    </div>

    <div class="field">
      <label>Status *</label>
      <p-select
        formControlName="status"
        [options]="statusOptions"
        optionLabel="label"
        optionValue="value"
        style="width: 100%"
      />
    </div>

  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      severity="secondary"
      (onClick)="showDialog = false"
    />
    <p-button
      label="Save"
      icon="pi pi-check"
      (onClick)="saveClient()"
      [disabled]="clientForm.invalid"
    />
  </ng-template>
</p-dialog>
