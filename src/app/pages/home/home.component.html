<div class="content">
  <div class="toolbar">
    <h2>Client List</h2>
    <div class="toolbar-actions">
      <input
        pInputText
        [(ngModel)]="searchText"
        (input)="onSearch()"
        placeholder="Search by name, ID or sector..."
        style="width: 300px"
      />
      <p-button
        *ngIf="canCreate"
        label="New Client"
        icon="pi pi-plus"
        (onClick)="newClient()"
      />
    </div>
  </div>

  <p-table
    [value]="filteredClients"
    stripedRows
    [paginator]="true"
    [rows]="5"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Company ID</th>
        <th>Company Name</th>
        <th>Sector</th>
        <th>Country</th>
        <th>Manager</th>
        <th>Status</th>
        <th *ngIf="canDelete">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-client>
      <tr (click)="goToDetail({data: client})" style="cursor: pointer">
        <td>{{ client.companyId }}</td>
        <td>{{ client.companyName }}</td>
        <td>{{ client.sector }}</td>
        <td>{{ client.country }}</td>
        <td>{{ client.manager }}</td>
        <td>
          <span [class]="'status-badge status-' + client.status">
            {{ client.status | uppercase }}
          </span>
        </td>
        <td *ngIf="canDelete" (click)="$event.stopPropagation()">
          <p-button
            icon="pi pi-trash"
            severity="danger"
            [text]="true"
            (onClick)="deleteClient(client)"
          />
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
